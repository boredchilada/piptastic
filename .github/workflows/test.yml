name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Validates the cross-platform claim: dev is Windows, prod is Linux.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest tests/ -ra

  self-audit:
    # Dogfood: run piptastic against its own dependencies. Informational only —
    # a PyPI/pip-audit hiccup or a fresh CVE should never red the build, so this
    # job never gates a merge. It proves the tool runs end-to-end against the
    # live network, which the unit tests (which mock the network) do not.
    name: self-audit (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Audit own dependencies
        run: python -m piptastic audit . --table

      - name: Emit SARIF
        run: python -m piptastic audit . --sarif > piptastic.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: piptastic-sarif
          path: piptastic.sarif
          if-no-files-found: ignore
